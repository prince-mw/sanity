<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80">
  <defs>
    <linearGradient id="hiveGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00"/>
      <stop offset="100%" style="stop-color:#FFB800"/>
    </linearGradient>
  </defs>
  <rect width="200" height="80" fill="white" rx="8"/>
  <!-- Hexagon/hive icon -->
  <polygon points="30,24 42,18 54,24 54,36 42,42 30,36" fill="url(#hiveGrad)" opacity="0.2"/>
