  <polygon points="36,38 44,34 52,38 52,46 44,50 36,46" fill="url(#hiveGrad)" opacity="0.5"/>
  <text x="62" y="38" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" letter-spacing="1" fill="#FF8C00">HIVE</text>
  <text x="62" y="54" font-family="'Segoe UI', Arial, sans-serif" font-size="18" font-weight="800" letter-spacing="1" fill="#1A1A2E">STACK</text>
