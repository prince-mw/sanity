[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Landing page redirects (CMS published pages)
[[redirects]]
  from = "/ooh-advertising-connected-commerce-report"
  to = "/lp/ooh-advertising-connected-commerce-report"
  status = 200

