version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "SANITY_WEBHOOK_SECRET=$SANITY_WEBHOOK_SECRET" >> .env.production
        - echo "SANITY_API_TOKEN=$SANITY_API_TOKEN" >> .env.production
        - echo "SANITY_API_READ_TOKEN=$SANITY_API_READ_TOKEN" >> .env.production
        - echo "SANITY_PREVIEW_SECRET=$SANITY_PREVIEW_SECRET" >> .env.production
        - echo "NEXT_PUBLIC_SANITY_PROJECT_ID=$NEXT_PUBLIC_SANITY_PROJECT_ID" >> .env.production
        - echo "NEXT_PUBLIC_SANITY_DATASET=$NEXT_PUBLIC_SANITY_DATASET" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
