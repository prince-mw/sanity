version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - env | grep -E '^(SANITY_|NEXT_PUBLIC_SANITY)' >> .env.production
        - cat .env.production
        - echo "SANITY_WEBHOOK_SECRET is set = $([ -n \"$SANITY_WEBHOOK_SECRET\" ] && echo YES || echo NO)"
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
